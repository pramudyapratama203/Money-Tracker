<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100">
    <div class="container mx-auto p-4 max-w-4xl">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">💰 Money Tracker</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-green-100 p-4 rounded-lg shadow text-center">
                <p class="text-sm text-green-700">Total Pemasukan</p>
                <p id="totalIncome" class="text-2xl font-semibold text-green-800">Rp 0</p>
            </div>
            <div class="bg-red-100 p-4 rounded-lg shadow text-center">
                <p class="text-sm text-red-700">Total Pengeluaran</p>
                <p id="totalExpense" class="text-2xl font-semibold text-red-800">Rp 0</p>
            </div>
            <div class="bg-blue-100 p-4 rounded-lg shadow text-center">
                <p class="text-sm text-blue-700">Saldo</p>
                <p id="totalBalance" class="text-2xl font-semibold text-blue-800">Rp 0</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-xl font-semibold mb-4">Tambah / Edit Transaksi</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Deskripsi</label>
                    <input type="text" id="description" placeholder="Mis: Gaji, Belanja"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Jumlah (Rp)</label>
                    <input type="number" id="amount" min="0" step="1000" placeholder="10000"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tipe</label>
                    <select id="type"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                        <option value="income">Pemasukan</option>
                        <option value="expense">Pengeluaran</option>
                    </select>
                </div>
                <div class="flex items-end space-x-2">
                    <button id="addBtn"
                        class="bg-green-600 hover:bg-green-700 text-white font-semibold px-4 py-2 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                        ➕ Tambah
                    </button>
                    <button id="updateBtn" disabled
                        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
                        🔄 Update
                    </button>
                    <button id="cancelBtn"
                        class="bg-gray-500 hover:bg-gray-600 text-white font-semibold px-4 py-2 rounded-lg transition">
                        ❌ Batal
                    </button>
                </div>
            </div>
        </div>

        <!-- Tabel Transaksi -->
        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="w-full table-auto">
                <thead class="bg-gray-200 text-gray-700">
                    <tr>
                        <th class="px-4 py-2 text-left">No</th>
                        <th class="px-4 py-2 text-left">Deskripsi</th>
                        <th class="px-4 py-2 text-left">Jumlah</th>
                        <th class="px-4 py-2 text-left">Tipe</th>
                        <th class="px-4 py-2 text-left">Aksi</th>
                    </tr>
                </thead>
                <tbody id="transactionBody" class="divide-y divide-gray-200">

                </tbody>
            </table>
            <p id="emptyMessage" class="text-center text-gray-500 py-4 hidden">Belum ada transaksi.</p>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>

</html>
