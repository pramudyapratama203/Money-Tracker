<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-base-200 min-h-screen font-sans">
    <div class="container mx-auto p-4 lg:p-8 max-w-5xl">
        <!-- Header -->
        <div class="flex flex-col items-center mb-10">
            <h1 class="text-4xl font-extrabold text-primary mb-2">Money Tracker</h1>
            <p class="text-base-content/70 italic">Kelola keuanganmu dengan bijak</p>
        </div>

        <!-- Summary Stats -->
        <div class="stats shadow w-full mb-8 bg-base-100">
            <div class="stat">
                <div class="stat-figure text-success">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        class="inline-block w-8 h-8 stroke-current">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <div class="stat-title font-bold">Pemasukan</div>
                <div id="totalIncome" class="stat-value text-success text-2xl lg:text-3xl">Rp 0</div>
                <div class="stat-desc italic">Bulan ini</div>
            </div>

            <div class="stat">
                <div class="stat-figure text-error">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        class="inline-block w-8 h-8 stroke-current">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                </div>
                <div class="stat-title font-bold">Pengeluaran</div>
                <div id="totalExpense" class="stat-value text-error text-2xl lg:text-3xl">Rp 0</div>
                <div class="stat-desc italic">Bulan ini</div>
            </div>

            <div class="stat">
                <div class="stat-figure text-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        class="inline-block w-8 h-8 stroke-current">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z">
                        </path>
                    </svg>
                </div>
                <div class="stat-title font-bold">Sisa Saldo</div>
                <div id="totalBalance" class="stat-value text-primary text-2xl lg:text-3xl">Rp 0</div>
                <div class="stat-desc text-primary font-bold italic">Saldo Tersedia</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Card -->
            <div class="lg:col-span-4">
                <div class="card bg-base-100 shadow-xl border border-base-300">
                    <div class="card-body">
                        <h2 class="card-title text-xl mb-4" id="formTitle">Tambah Transaksi</h2>

                        <div class="form-control w-full">
                            <label class="label"><span class="label-text font-semibold">Deskripsi</span></label>
                            <input type="text" id="description" placeholder="Gaji, Makan, dll"
                                class="input input-bordered w-full focus:input-primary" />
                        </div>

                        <div class="form-control w-full">
                            <label class="label"><span class="label-text font-semibold">Jumlah (Rp)</span></label>
                            <input type="number" id="amount" placeholder="50000"
                                class="input input-bordered w-full focus:input-primary" />
                        </div>

                        <div class="form-control w-full">
                            <label class="label"><span class="label-text font-semibold">Tanggal</span></label>
                            <input type="date" id="date" class="input input-bordered w-full focus:input-primary" />
                        </div>

                        <div class="form-control w-full">
                            <label class="label"><span class="label-text font-semibold">Kategori Tipe</span></label>
                            <select id="type" class="select select-bordered w-full focus:select-primary">
                                <option value="income">Pemasukan 📈</option>
                                <option value="expense">Pengeluaran 📉</option>
                            </select>
                        </div>

                        <div class="card-actions flex-col mt-6 space-y-2">
                            <button id="addBtn" class="btn btn-primary w-full">Simpan Transaksi</button>
                            <div id="editActions" class="hidden w-full flex space-x-2">
                                <button id="updateBtn" class="btn btn-info flex-1">Update</button>
                                <button id="cancelBtn" class="btn btn-ghost">Batal</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table Card -->
            <div class="lg:col-span-8">
                <div class="card bg-base-100 shadow-xl border border-base-300 overflow-hidden">
                    <div class="p-6 pb-0 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 class="text-xl font-bold">Riwayat Transaksi</h2>
                            <div class="badge badge-outline mt-1" id="transactionCount">0 Transaksi</div>
                        </div>
                        <div class="flex flex-wrap gap-2 w-full md:w-auto">
                            <div class="join">
                                <input id="searchInput" type="text" placeholder="Cari deskripsi..."
                                    class="input input-bordered input-sm join-item w-full md:w-40" />
                            </div>
                            <input id="dateFilter" type="date" class="input input-bordered input-sm" />
                            <button id="resetFilter" class="btn btn-sm btn-ghost" title="Reset Filter">✕</button>
                        </div>
                    </div>

                    <div class="p-6 overflow-x-auto">
                        <table class="table table-zebra w-full">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Deskripsi</th>
                                    <th>Jumlah</th>
                                    <th>Tipe</th>
                                    <th class="text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="transactionBody">
                                <!-- Data will be inserted here -->
                            </tbody>
                        </table>
                        <div id="emptyMessage"
                            class="flex flex-col items-center justify-center py-10 text-base-content/50 hidden">
                            <span class="text-5xl mb-2">📭</span>
                            <p>Belum ada data transaksi.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>

</body>

</html>
