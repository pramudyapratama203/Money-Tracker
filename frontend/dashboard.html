<!DOCTYPE html>
<html lang="en" class="bg-slate-950"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Money Tracker</title>
</head>

<body class="min-h-screen flex items-center justify-center p-4 antialiased text-slate-200 bg-slate-950">
    <div class="w-full max-w-sm flex flex-col gap-4">

        <!-- Tab -->
        <div role="tablist" class="tabs tabs-border gap-x-8">
            <a role="tab" class="tab text-slate-400 hover:text-white font-bold transition-all" id="tabKembali">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Kembali
            </a>
             <a role="tab" class="tab text-slate-400 hover:text-white font-bold transition-all" id="tabStatistik">
                Statistik
            </a>
        </div>

        <!-- Tampilan Uang Pemasukan dan Pengeluaran -->
        <div class="grid grid-cols-2 gap-3 mb-2">
            <!-- Total saldo -->
            <div class="col-span-2 bg-indigo-600 border-b-4 border-indigo-800 p-4 rounded-2xl shadow-xl">
                <p class="text-[10px] uppercase font-bold text-indigo-200 tracking-widest">Total Saldo</p>
                <h3 id="totalSaldo" class="text-2xl font-black text-white">Rp 0</h3>
            </div>
            <!-- Pemasukan -->
            <div class="bg-slate-900 border-2 border-slate-800 border-b-4 p-3 rounded-2xl">
                <p class="text-[9px] uppercase font-bold text-slate-500 tracking-widest">Pemasukan</p>
                <h3 id="totalPemasukan" class="text-sm font-bold text-success">Rp 0</h3>
            </div>
            <!-- Pengeluaran -->
            <div class="bg-slate-900 border-2 border-slate-800 border-b-4 p-3 rounded-2xl">
                <p class="text-[9px] uppercase font-bold text-slate-500 tracking-widest">Pengeluaran</p>
                <h3 id="totalPengeluaran" class="text-sm font-bold text-warning">Rp 0</h3>
            </div>
        </div>

        <!-- Form Catatan Transaksi -->
        <div class="card bg-slate-900 w-full shrink-0 border-2 border-slate-800 border-b-8 rounded-3xl overflow-hidden shadow-2xl">
            <div class="card-body p-6 md:p-8">
                <h2 class="text-2xl font-bold text-white mb-6 text-center tracking-tight">Tambah Catatan</h2>
                
                <!-- Input nonimal -->
                <form id="formTransaksi" class="space-y-4">
                    <fieldset class="fieldset space-y-4">
                        <div class="form-control">
                            <label class="label text-slate-500 font-bold uppercase text-[10px] tracking-widest">Input Nominal</label>
                            <input 
                                id="inputNominal" 
                                type="text" 
                                class="input input-bordered bg-slate-950 border-2 border-slate-800 focus:border-indigo-500 transition-all rounded-xl text-lg font-semibold h-12" 
                                inputmode="numeric"
                                placeholder="Rp 0"/>
                        </div>
                        
                        <!-- Radio button Pemasukan dan Pengeluaran -->
                        <div class="form-control">
                            <label class="label text-slate-500 font-bold uppercase text-[10px] tracking-widest">Tipe Transaksi</label>
                            <div class="flex gap-2 bg-slate-950 p-2 rounded-2xl border-2 border-slate-800">
                                
                                <label class="flex items-center gap-2 cursor-pointer p-2 flex-1 justify-center rounded-xl hover:bg-slate-900 transition has-[:checked]:bg-indigo-500/10">
                                    <span class="label-text font-bold text-white text-xs">Pemasukan</span>
                                    <input id="pemasukan" name="tipe" type="radio" class="radio radio-success radio-sm" checked="checked" />
                                </label>

                                <label class="flex items-center gap-2 cursor-pointer p-2 flex-1 justify-center rounded-xl hover:bg-slate-900 transition has-[:checked]:bg-indigo-500/10">
                                    <span class="label-text font-bold text-xs">Pengeluaran</span>
                                    <input id="pengeluaran" name="tipe" type="radio" class="radio radio-warning radio-sm" /> 
                                </label>

                            </div>
                        </div>

                        <!-- Tanggal Transaksi -->
                        <div class="form-control">
                            <label class="label text-slate-500 font-bold uppercase text-[10px] tracking-widest">Tanggal</label>
                            <input 
                                type="date"
                                id="tanggalTransaksi"
                                class="input input-bordered bg-slate-950 border-2 border-slate-800 focus:border-indigo-500 rounded-xl w-full h-12 text-sm"
                                required
                            />
                        </div>
                        
                        <!-- Catatan Transaksi -->
                        <div class="form-control">
                            <label class="label text-slate-500 font-bold uppercase text-[10px] tracking-widest">Catatan</label>
                            <textarea 
                                id="catatanTransaksi"
                                class="textarea textarea-bordered bg-slate-950 border-2 border-slate-800 focus:border-indigo-500 rounded-xl h-24 resize-none text-sm"
                                placeholder="Makan siang bersama tim..."
                            ></textarea>
                        </div>
                    </fieldset>

                    <div class="mt-6">
                        <button type="submit" class="btn btn-primary w-full rounded-2xl border-b-4 border-indigo-800 hover:border-b-0 hover:mt-1 active:scale-95 transition-all font-bold text-lg h-14 shadow-lg shadow-indigo-500/20">
                            Simpan Transaksi
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tampilan Daftar Transaksi -->
        <div class="w-full max-w-sm mt-8">
            <h3 class="text-white font-bold mb-4 px-2 uppercase text-xs tracking-widest text-slate-500">Riwayat Transaksi</h3>
            <div id="listTransaksi" class="space-y-3">
                <p class="text-slate-600 text-center text-sm italic">Belum ada transaksi.</p>
            </div>
        </div>
    </div>

    <!-- Alert Position -->
    <div id="alertContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] w-full max-w-sm px-4"></div>

    <!-- Confirm Hapus Style -->
    <dialog id="modalHapus" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box bg-slate-900 border-2 border-slate-800 shadow-2xl rounded-[2rem]">
            <div class="flex justify-center mb-4">
                <div class="bg-error/10 p-4 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-error" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </div>
            </div>
            
            <!-- Pertanyaan -->
            <h3 class="font-black text-xl text-white text-center">Hapus Transaksi?</h3>
            <p class="py-4 text-slate-400 text-center text-sm">Tindakan ini tidak dapat dibatalkan. Apakah kamu yakin ingin menghapus catatan ini?</p>
            <div class="modal-action flex justify-center gap-3">

            <!-- Batal -->
            <form method="dialog" class="flex-1">
                <button class="btn btn-ghost w-full rounded-xl font-bold">Batal</button>
            </form>

            <!-- Iya, Hapus -->
            <button id="btnConfirmHapus" class="btn btn-error flex-1 rounded-xl font-bold text-white shadow-lg shadow-error/20">Iya, Hapus!</button>
            </div>
        </div>
    </dialog>

    <script type="module" src="/src/dashboard.js"></script>
</body>
</html>
