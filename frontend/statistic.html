<!DOCTYPE html>
<html lang="en" class="bg-slate-950">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik</title>
</head>

<body class="min-h-screen bg-slate-950 text-slate-200 antialiased p-4 md:p-8 overflow-x-hidden">

    <div class="max-w-5xl mx-auto space-y-6">
        <div role="tablist" class="tabs tabs-border gap-x-8 mb-4">
            <a role="tab" class="tab text-slate-400 hover:text-white font-bold transition-all" id="tabKeDashboard">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Dashboard
            </a>
            <a role="tab" class="tab tab-active text-white border-white font-bold transition-all" id="tabStatistik">
                Statistik
            </a>
        </div>

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <h1 class="text-2xl md:text-3xl font-black text-white tracking-tighter">Statistik Keuangan</h1>

            <div class="form-control w-full md:max-w-xs">
                <select id="filterBulan"
                    class="select select-bordered bg-slate-900 border-2 border-slate-800 rounded-2xl text-white focus:border-indigo-500 flex-1 mb-2">
                    <option value="all">Semua Bulan</option>
                    <option value="01">Januari</option>
                    <option value="02">Februari</option>
                    <option value="03">Maret</option>
                    <option value="04">April</option>
                    <option value="05">Mei</option>
                    <option value="06">Juni</option>
                    <option value="07">Juli</option>
                    <option value="08">Agustus</option>
                    <option value="09">September</option>
                    <option value="10">Oktober</option>
                    <option value="11">November</option>
                    <option value="12">Desember</option>
                </select>

                <select id="filterTahun"
                    class="select select-bordered bg-slate-900 border-2 border-slate-800 rounded-2xl text-white">
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <div class="lg:col-span-7">
                <div
                    class="relative bg-slate-900/40 backdrop-blur-xl border border-white/5 p-6 md:p-10 rounded-[3rem] shadow-2xl overflow-hidden aspect-square flex items-center justify-center">
                    <div class="absolute -top-20 -left-20 w-64 h-64 bg-indigo-500/10 blur-[100px]"></div>

                    <canvas id="chartKeuangan" class="relative z-10 w-full h-full"></canvas>

                    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center z-0">
                        <p class="text-[10px] md:text-xs uppercase font-bold text-slate-500 tracking-widest">Pengeluaran
                        </p>
                        <p id="labelTengah" class="text-xl md:text-3xl font-black text-white">Rp 0</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-4">
                <div
                    class="group bg-slate-900/60 border border-slate-800 p-6 rounded-[2.5rem] transition-all hover:border-indigo-500/50">
                    <p class="text-xs font-bold text-indigo-400 uppercase mb-1">Total Pemasukan</p>
                    <p id="statPemasukan" class="text-2xl font-black text-white">Rp 0</p>
                </div>

                <div
                    class="group bg-slate-900/60 border border-slate-800 p-6 rounded-[2.5rem] transition-all hover:border-orange-500/50">
                    <p class="text-xs font-bold text-orange-400 uppercase mb-1">Total Pengeluaran</p>
                    <p id="statPengeluaran" class="text-2xl font-black text-white">Rp 0</p>
                </div>

                <button onclick="window.location.href='/dashboard.html'"
                    class="btn btn-primary w-full rounded-[1.5rem] h-16 font-bold text-lg shadow-lg shadow-indigo-500/20 border-b-4 border-indigo-800 hover:border-b-0 active:translate-y-1 transition-all">
                    Tambah Transaksi Baru
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="/src/statistic.js"></script>
</body>

</html>
